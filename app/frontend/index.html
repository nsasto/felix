
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felix | Workspace Orchestrator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            felix: {
              50: '#f5f7ff',
              100: '#ebf0fe',
              200: '#dce5fd',
              300: '#c2d1fb',
              400: '#9db4f7',
              500: '#738ef1',
              600: '#5268e8',
              700: '#4152d6',
              800: '#3945ad',
              900: '#323d8a',
              950: '#212654',
            }
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'in': 'enter 0.3s ease-out',
          },
          keyframes: {
            enter: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050608;
      color: #f1f5f9;
      margin: 0;
      overflow: hidden;
    }
    .font-mono {
      font-family: 'Fira Code', monospace;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }
    
    .animate-in {
      animation: enter 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Markdown Preview Styling */
    .markdown-preview h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1.5rem; color: #ffffff; border-bottom: 2px solid #1e293b; padding-bottom: 0.75rem; letter-spacing: -0.025em; }
    .markdown-preview h2 { font-size: 1.75rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #f8fafc; border-bottom: 1px solid #1e293b/50; padding-bottom: 0.25rem; }
    .markdown-preview h3 { font-size: 1.35rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #e2e8f0; }
    .markdown-preview p { margin-bottom: 1.25rem; line-height: 1.75; color: #94a3b8; font-size: 0.95rem; }
    .markdown-preview ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; color: #94a3b8; }
    .markdown-preview li { margin-bottom: 0.5rem; }
    .markdown-preview li input[type="checkbox"] { margin-right: 0.5rem; pointer-events: none; }
    .markdown-preview code { font-family: 'Fira Code', monospace; background-color: #1e293b; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; color: #738ef1; }
    .markdown-preview pre { background: #0a0c10 !important; border: 1px solid #1e293b !important; border-radius: 12px !important; padding: 1.25rem !important; margin: 1.5rem 0 !important; overflow-x: auto; }
    .markdown-preview blockquote { border-left: 4px solid #5268e8; padding: 0.75rem 0 0.75rem 1.5rem; font-style: italic; color: #64748b; background: rgba(82, 104, 232, 0.05); border-radius: 0 8px 8px 0; margin-bottom: 1.5rem; }
    .markdown-preview a { color: #738ef1; text-decoration: none; font-weight: 500; }
    .markdown-preview a:hover { color: #9db4f7; text-decoration: underline; }
    .markdown-preview table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; border: 1px solid #1e293b; border-radius: 8px; overflow: hidden; }
    .markdown-preview th { background: #1e293b; color: #f8fafc; text-align: left; padding: 0.75rem 1rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .markdown-preview td { padding: 0.75rem 1rem; border-bottom: 1px solid #1e293b; color: #94a3b8; font-size: 0.9rem; }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "marked": "https://esm.sh/marked@12.0.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="dark">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
