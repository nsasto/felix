<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felix | Workspace Orchestrator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            felix: {
              50: '#f5f7ff',
              100: '#ebf0fe',
              200: '#dce5fd',
              300: '#c2d1fb',
              400: '#9db4f7',
              500: '#738ef1',
              600: '#5268e8',
              700: '#4152d6',
              800: '#3945ad',
              900: '#323d8a',
              950: '#212654',
            }
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'in': 'enter 0.3s ease-out',
            'polling-pulse': 'polling-pulse 2s ease-in-out infinite',
          },
          keyframes: {
            enter: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'polling-pulse': {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap');

    /* ============================================
       Theme System: CSS Custom Properties
       ============================================ */

    /* Dark Theme (default) */
    :root,
    .dark {
      /* Background colors */
      --bg-deepest: #050608;
      --bg-deep: #0a0c10;
      --bg-base: #0d1117;
      --bg-elevated: #161b22;
      --bg-surface: #21262d;

      /* Text colors */
      --text-primary: #f1f5f9;
      --text-secondary: #c9d1d9;
      --text-tertiary: #8b949e;
      --text-muted: #6e7781;
      --text-faint: #484f58;

      /* Border colors */
      --border-default: rgba(48, 54, 61, 0.6);
      --border-muted: rgba(48, 54, 61, 0.4);
      --border-subtle: rgba(48, 54, 61, 0.2);

      /* Interactive colors */
      --hover-bg: rgba(31, 41, 55, 0.5);
      --active-bg: rgba(31, 41, 55, 0.8);
      --selected-bg: rgba(115, 142, 241, 0.1);

      /* Accent colors (felix purple - same in both themes) */
      --accent-primary: #738ef1;
      --accent-secondary: #5268e8;
      --accent-tertiary: #9db4f7;

      /* Status colors */
      --status-success: #3fb950;
      --status-warning: #d29922;
      --status-error: #f85149;
      --status-info: #58a6ff;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);

      /* Scrollbar */
      --scrollbar-thumb: #1f2937;
      --scrollbar-thumb-hover: #374151;

      /* Code/Markdown specific */
      --code-bg: #1e293b;
      --code-text: #738ef1;
      --pre-bg: #0a0c10;
      --pre-border: #1e293b;
      --blockquote-bg: rgba(82, 104, 232, 0.05);
      --table-header-bg: #1e293b;
    }

    /* Light Theme */
    .light {
      /* Background colors */
      --bg-deepest: #f0f2f5;
      --bg-deep: #f6f8fa;
      --bg-base: #ffffff;
      --bg-elevated: #ffffff;
      --bg-surface: #f6f8fa;

      /* Text colors */
      --text-primary: #24292f;
      --text-secondary: #57606a;
      --text-tertiary: #6e7781;
      --text-muted: #8b949e;
      --text-faint: #afb8c1;

      /* Border colors */
      --border-default: rgba(208, 215, 222, 0.8);
      --border-muted: rgba(208, 215, 222, 0.6);
      --border-subtle: rgba(208, 215, 222, 0.4);

      /* Interactive colors */
      --hover-bg: rgba(208, 215, 222, 0.4);
      --active-bg: rgba(208, 215, 222, 0.6);
      --selected-bg: rgba(82, 104, 232, 0.08);

      /* Accent colors (darker for light theme contrast) */
      --accent-primary: #5268e8;
      --accent-secondary: #4152d6;
      --accent-tertiary: #738ef1;

      /* Status colors (slightly adjusted for light bg) */
      --status-success: #1a7f37;
      --status-warning: #9a6700;
      --status-error: #cf222e;
      --status-info: #0969da;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);

      /* Scrollbar */
      --scrollbar-thumb: #d0d7de;
      --scrollbar-thumb-hover: #afb8c1;

      /* Code/Markdown specific */
      --code-bg: #f6f8fa;
      --code-text: #5268e8;
      --pre-bg: #f6f8fa;
      --pre-border: #d0d7de;
      --blockquote-bg: rgba(82, 104, 232, 0.05);
      --table-header-bg: #f6f8fa;
    }

    /* Theme transition for smooth switching */
    html {
      transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out;
    }

    html.theme-transition,
    html.theme-transition *,
    html.theme-transition *::before,
    html.theme-transition *::after {
      transition: background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out !important;
    }

    /* ============================================
       Base Styles
       ============================================ */

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deepest);
      color: var(--text-primary);
      margin: 0;
      overflow: hidden;
    }

    .font-mono {
      font-family: 'Fira Code', monospace;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    /* Firefox scrollbar */
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    .animate-in {
      animation: enter 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Markdown Preview Styling */
    .markdown-preview h1 {
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
      border-bottom: 2px solid var(--border-default);
      padding-bottom: 0.75rem;
      letter-spacing: -0.025em;
    }

    .markdown-preview h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-muted);
      padding-bottom: 0.25rem;
    }

    .markdown-preview h3 {
      font-size: 1.35rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: var(--text-secondary);
    }

    .markdown-preview p {
      margin-bottom: 1.25rem;
      line-height: 1.75;
      color: var(--text-tertiary);
      font-size: 0.95rem;
    }

    .markdown-preview ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1.25rem;
      color: var(--text-tertiary);
    }

    .markdown-preview ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      margin-bottom: 1.25rem;
      color: var(--text-tertiary);
    }

    .markdown-preview li {
      margin-bottom: 0.5rem;
    }

    .markdown-preview li input[type="checkbox"] {
      margin-right: 0.5rem;
      pointer-events: none;
    }

    .markdown-preview strong {
      font-weight: 600;
      color: var(--text-primary);
    }

    .markdown-preview em {
      font-style: italic;
    }

    .markdown-preview hr {
      border: none;
      border-top: 1px solid var(--border-default);
      margin: 2rem 0;
    }

    .markdown-preview code {
      font-family: 'Fira Code', monospace;
      background-color: var(--code-bg);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
      color: var(--code-text);
    }

    .markdown-preview pre {
      background: var(--pre-bg) !important;
      border: 1px solid var(--pre-border) !important;
      border-radius: 12px !important;
      padding: 1.25rem !important;
      margin: 1.5rem 0 !important;
      overflow-x: auto;
    }

    .markdown-preview blockquote {
      border-left: 4px solid var(--accent-secondary);
      padding: 0.75rem 0 0.75rem 1.5rem;
      font-style: italic;
      color: var(--text-muted);
      background: var(--blockquote-bg);
      border-radius: 0 8px 8px 0;
      margin-bottom: 1.5rem;
    }

    .markdown-preview a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .markdown-preview a:hover {
      color: var(--accent-tertiary);
      text-decoration: underline;
    }

    .markdown-preview table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      overflow: hidden;
    }

    .markdown-preview th {
      background: var(--table-header-bg);
      color: var(--text-primary);
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .markdown-preview td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-default);
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    /* ============================================
       Theme-aware utility classes for components
       ============================================ */
    .theme-bg-deepest {
      background-color: var(--bg-deepest);
    }

    .theme-bg-deep {
      background-color: var(--bg-deep);
    }

    .theme-bg-base {
      background-color: var(--bg-base);
    }

    .theme-bg-elevated {
      background-color: var(--bg-elevated);
    }

    .theme-bg-surface {
      background-color: var(--bg-surface);
    }

    .theme-text-primary {
      color: var(--text-primary);
    }

    .theme-text-secondary {
      color: var(--text-secondary);
    }

    .theme-text-tertiary {
      color: var(--text-tertiary);
    }

    .theme-text-muted {
      color: var(--text-muted);
    }

    .theme-border {
      border-color: var(--border-default);
    }

    .theme-border-muted {
      border-color: var(--border-muted);
    }

    .theme-border-subtle {
      border-color: var(--border-subtle);
    }

    /* ============================================
       Kanban Card Styling
       ============================================ */
    
    /* Base kanban card - transition for smooth mode switching */
    .kanban-card {
      transition: all 300ms ease-in-out;
      min-height: 0;
    }

    /* Compact kanban card - reduced height and content */
    .kanban-card-compact {
      max-height: 80px;
      overflow: hidden;
    }

    /* Single line truncation for compact title */
    .line-clamp-1 {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Two line truncation for normal title */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============================================
       ANSI Console Color Classes
       These map to ansi-to-react's useClasses output
       ============================================ */
    
    /* Console container styling */
    .ansi-console {
      background-color: var(--bg-deepest);
      color: var(--text-secondary);
    }

    /* ANSI Foreground Colors (Standard) */
    .ansi-black { color: #282c34; }
    .ansi-red { color: #e06c75; }
    .ansi-green { color: #98c379; }
    .ansi-yellow { color: #e5c07b; }
    .ansi-blue { color: #61afef; }
    .ansi-magenta { color: #c678dd; }
    .ansi-cyan { color: #56b6c2; }
    .ansi-white { color: #abb2bf; }

    /* ANSI Foreground Colors (Bright/Bold) */
    .ansi-bright-black { color: #5c6370; }
    .ansi-bright-red { color: #e06c75; }
    .ansi-bright-green { color: #98c379; }
    .ansi-bright-yellow { color: #d19a66; }
    .ansi-bright-blue { color: #61afef; }
    .ansi-bright-magenta { color: #c678dd; }
    .ansi-bright-cyan { color: #56b6c2; }
    .ansi-bright-white { color: #ffffff; }

    /* ANSI Background Colors (Standard) */
    .ansi-bg-black { background-color: #282c34; }
    .ansi-bg-red { background-color: #e06c75; }
    .ansi-bg-green { background-color: #98c379; }
    .ansi-bg-yellow { background-color: #e5c07b; }
    .ansi-bg-blue { background-color: #61afef; }
    .ansi-bg-magenta { background-color: #c678dd; }
    .ansi-bg-cyan { background-color: #56b6c2; }
    .ansi-bg-white { background-color: #abb2bf; }

    /* ANSI Background Colors (Bright) */
    .ansi-bright-bg-black { background-color: #5c6370; }
    .ansi-bright-bg-red { background-color: #e06c75; }
    .ansi-bright-bg-green { background-color: #98c379; }
    .ansi-bright-bg-yellow { background-color: #d19a66; }
    .ansi-bright-bg-blue { background-color: #61afef; }
    .ansi-bright-bg-magenta { background-color: #c678dd; }
    .ansi-bright-bg-cyan { background-color: #56b6c2; }
    .ansi-bright-bg-white { background-color: #ffffff; }

    /* ANSI Text Styles */
    .ansi-bold { font-weight: bold; }
    .ansi-dim { opacity: 0.7; }
    .ansi-italic { font-style: italic; }
    .ansi-underline { text-decoration: underline; }
    .ansi-blink { animation: blink 1s step-end infinite; }
    .ansi-reverse { filter: invert(1); }
    .ansi-hidden { visibility: hidden; }
    .ansi-strikethrough { text-decoration: line-through; }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Light theme ANSI colors (adjusted for visibility) */
    .light .ansi-black { color: #24292f; }
    .light .ansi-red { color: #cf222e; }
    .light .ansi-green { color: #1a7f37; }
    .light .ansi-yellow { color: #9a6700; }
    .light .ansi-blue { color: #0969da; }
    .light .ansi-magenta { color: #8250df; }
    .light .ansi-cyan { color: #1b7c83; }
    .light .ansi-white { color: #57606a; }

    .light .ansi-bright-black { color: #6e7781; }
    .light .ansi-bright-red { color: #a40e26; }
    .light .ansi-bright-green { color: #116329; }
    .light .ansi-bright-yellow { color: #7d5400; }
    .light .ansi-bright-blue { color: #0550ae; }
    .light .ansi-bright-magenta { color: #6639ba; }
    .light .ansi-bright-cyan { color: #136166; }
    .light .ansi-bright-white { color: #24292f; }

    .light .ansi-bg-black { background-color: #24292f; color: #ffffff; }
    .light .ansi-bg-red { background-color: #cf222e; color: #ffffff; }
    .light .ansi-bg-green { background-color: #1a7f37; color: #ffffff; }
    .light .ansi-bg-yellow { background-color: #9a6700; color: #ffffff; }
    .light .ansi-bg-blue { background-color: #0969da; color: #ffffff; }
    .light .ansi-bg-magenta { background-color: #8250df; color: #ffffff; }
    .light .ansi-bg-cyan { background-color: #1b7c83; color: #ffffff; }
    .light .ansi-bg-white { background-color: #f6f8fa; color: #24292f; }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "marked": "https://esm.sh/marked@12.0.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="dark">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
