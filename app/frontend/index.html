<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felix | Workspace Orchestrator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Supabase-inspired green brand colors
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#4dd796',
              500: '#3ecf8e',  // Primary brand color
              600: '#2fb87a',
              700: '#26a269',
              800: '#1e8b5c',
              900: '#166d47',
              950: '#0d4530',
            }
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'in': 'enter 0.3s ease-out',
            'polling-pulse': 'polling-pulse 2s ease-in-out infinite',
            'workflow-pulse': 'workflow-pulse 2s ease-in-out infinite',
          },
          keyframes: {
            enter: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'polling-pulse': {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            'workflow-pulse': {
              '0%, 100%': {
                boxShadow: '0 0 0 0 rgba(62, 207, 142, 0.4)',
                borderColor: 'rgb(62, 207, 142)',
              },
              '50%': {
                boxShadow: '0 0 12px 4px rgba(62, 207, 142, 0.3)',
                borderColor: 'rgb(110, 231, 183)',
              },
            }
          }
        }
      }
    }
  </script>
  <!-- Design System Styles -->
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/components.css">
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "marked": "https://esm.sh/marked@12.0.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="dark">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
